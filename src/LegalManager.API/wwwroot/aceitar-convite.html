<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Aceitar Convite</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">⚖️ LegalManager</div>
      <div class="auth-subtitle">Complete seu cadastro para aceitar o convite</div>
      <div id="alert" class="alert" style="display:none"></div>
      <form id="conviteForm">
        <div class="form-group">
          <label>Seu Nome *</label>
          <input type="text" id="nome" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Senha *</label>
          <input type="password" id="senha" class="form-control" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Criar conta</button>
      </form>
    </div>
  </div>
  <script type="module">
    import { aceitarConvite } from '/js/auth.js';
    const token = new URLSearchParams(window.location.search).get('token');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    if (!token) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Token de convite inválido.';
      alertEl.style.display = 'block';
    }

    document.getElementById('conviteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      alertEl.style.display = 'none';
      try {
        await aceitarConvite({ token, nome: document.getElementById('nome').value, senha: document.getElementById('senha').value });
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
