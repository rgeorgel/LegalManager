<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Tarefas</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .prioridade-baixa   { background:#f0fdf4; color:#16a34a; }
    .prioridade-media   { background:#fefce8; color:#ca8a04; }
    .prioridade-alta    { background:#fff7ed; color:#ea580c; }
    .prioridade-urgente { background:#fef2f2; color:#dc2626; }
    .status-pendente    { background:#f3f4f6; color:#374151; }
    .status-emandamento { background:#dbeafe; color:#1d4ed8; }
    .status-concluida   { background:#d1fae5; color:#057a55; }
    .status-cancelada   { background:#fee2e2; color:#e02424; }
    .badge-atrasada     { background:#fef2f2; color:#dc2626; font-size:11px; padding:2px 6px; border-radius:4px; }
    .tarefa-card { border:1px solid var(--color-border); border-radius:var(--radius); padding:14px 16px; background:var(--color-surface); display:flex; flex-direction:column; gap:8px; }
    .tarefa-card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap; }
    .tarefa-card-titulo { font-weight:600; font-size:15px; }
    .tarefa-card-meta   { display:flex; flex-wrap:wrap; gap:8px; font-size:13px; color:var(--color-text-muted); }
    .tarefa-card-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .tags-list { display:flex; flex-wrap:wrap; gap:4px; }
    .tag { background:#e5e7eb; color:#374151; font-size:11px; padding:2px 8px; border-radius:999px; }
    .kanban-columns { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .kanban-col { background:#f9fafb; border:1px solid var(--color-border); border-radius:var(--radius); padding:12px; }
    .kanban-col-title { font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--color-text-muted); margin-bottom:12px; }
    .kanban-items { display:flex; flex-direction:column; gap:8px; }
    .view-btn { padding:6px 14px; border:1px solid var(--color-border); background:var(--color-surface); border-radius:var(--radius); cursor:pointer; font-size:13px; }
    .view-btn.active { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="header">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="header-logo">⚖️ LegalManager</div>
    <div class="header-spacer"></div>
    <div class="header-user">
      <span class="header-user-name"></span>
      <span style="color:var(--color-border)">|</span>
      <span class="header-tenant"></span>
      <button class="btn btn-secondary btn-sm" id="logoutBtn">Sair</button>
    </div>
  </header>

  <nav class="sidebar">
    <ul class="sidebar-nav">
      <li><a href="/pages/dashboard.html">📊 Dashboard</a></li>
      <li><a href="/pages/processos.html">⚖️ Processos</a></li>
      <li><a href="/pages/contatos.html">👥 Contatos</a></li>
      <li><a href="/pages/tarefas.html">✅ Tarefas</a></li>
      <li><a href="/pages/agenda.html">📅 Agenda</a></li>
      <li><a href="/pages/publicacoes.html">📰 Publicações</a></li>
      <li><a href="/pages/prazos.html">⏰ Prazos</a></li>
      <li><a href="/pages/usuarios.html">🔑 Usuários</a></li>
      <li><a href="/pages/configuracoes.html">⚙️ Configurações</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Tarefas</h1>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="view-btn active" id="viewLista">Lista</button>
        <button class="view-btn" id="viewKanban">Kanban</button>
        <button class="btn btn-primary" id="btnNova">+ Nova Tarefa</button>
      </div>
    </div>

    <div class="filter-bar">
      <input type="search" id="filtBusca" class="form-control" placeholder="Buscar tarefas...">
      <select id="filtStatus" class="form-control" style="width:auto">
        <option value="">Todos os status</option>
        <option value="Pendente">Pendente</option>
        <option value="EmAndamento">Em Andamento</option>
        <option value="Concluida">Concluída</option>
        <option value="Cancelada">Cancelada</option>
      </select>
      <select id="filtPrioridade" class="form-control" style="width:auto">
        <option value="">Todas as prioridades</option>
        <option value="Baixa">Baixa</option>
        <option value="Media">Média</option>
        <option value="Alta">Alta</option>
        <option value="Urgente">Urgente</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer">
        <input type="checkbox" id="filtAtrasada"> Apenas atrasadas
      </label>
    </div>

    <div id="viewListaContainer">
      <div id="tarefasList" style="display:flex;flex-direction:column;gap:10px"></div>
      <div id="pagination" class="pagination" style="margin-top:16px"></div>
    </div>

    <div id="viewKanbanContainer" style="display:none">
      <div class="kanban-columns">
        <div class="kanban-col">
          <div class="kanban-col-title">Pendente</div>
          <div class="kanban-items" id="kanban-Pendente"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-title">Em Andamento</div>
          <div class="kanban-items" id="kanban-EmAndamento"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-title">Concluída</div>
          <div class="kanban-items" id="kanban-Concluida"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-title">Cancelada</div>
          <div class="kanban-items" id="kanban-Cancelada"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Nova/Editar Tarefa -->
<div class="modal-overlay" id="modalTarefa" style="display:none">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTarefaTitulo">Nova Tarefa</h2>
      <button class="modal-close" id="modalTarefaClose">&times;</button>
    </div>
    <form id="formTarefa" novalidate>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Título *</label>
          <input type="text" id="fTitulo" class="form-control" maxlength="300" required>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea id="fDescricao" class="form-control" rows="3" maxlength="4000"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Prioridade *</label>
            <select id="fPrioridade" class="form-control" required>
              <option value="Baixa">Baixa</option>
              <option value="Media" selected>Média</option>
              <option value="Alta">Alta</option>
              <option value="Urgente">Urgente</option>
            </select>
          </div>
          <div class="form-group" id="fStatusGroup" style="display:none">
            <label class="form-label">Status *</label>
            <select id="fStatus" class="form-control">
              <option value="Pendente">Pendente</option>
              <option value="EmAndamento">Em Andamento</option>
              <option value="Concluida">Concluída</option>
              <option value="Cancelada">Cancelada</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Prazo</label>
          <input type="datetime-local" id="fPrazo" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Tags (separadas por vírgula)</label>
          <input type="text" id="fTags" class="form-control" placeholder="ex: urgente, revisão, cliente-x">
        </div>
        <div id="fmsgErro" class="alert alert-error" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btnCancelarTarefa">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSalvarTarefa">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/js/tarefas.js"></script>
</body>
</html>
