<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Contatos</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="header-logo">⚖️ LegalManager</div>
      <div class="header-spacer"></div>
      <div class="header-user">
        <span class="header-user-name"></span>
        <span style="color:var(--color-border)">|</span>
        <span class="header-tenant"></span>
        <button class="btn btn-secondary btn-sm" id="logoutBtn">Sair</button>
      </div>
    </header>

    <nav class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="/pages/dashboard.html">📊 Dashboard</a></li>
        <li><a href="/pages/processos.html">⚖️ Processos</a></li>
        <li><a href="/pages/contatos.html">👥 Contatos</a></li>
        <li><a href="/pages/tarefas.html">✅ Tarefas</a></li>
        <li><a href="/pages/agenda.html">📅 Agenda</a></li>
        <li><a href="/pages/usuarios.html">🔑 Usuários</a></li>
        <li><a href="/pages/configuracoes.html">⚙️ Configurações</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Contatos</h1>
        <button class="btn btn-primary" id="btnNovo">+ Novo Contato</button>
      </div>

      <div class="filter-bar">
        <input type="search" id="filtBusca" class="form-control" placeholder="Buscar por nome, CPF/CNPJ ou e-mail...">
        <select id="filtTipo" class="form-control" style="width:auto">
          <option value="">Todos os tipos</option>
          <option value="PF">Pessoa Física</option>
          <option value="PJ">Pessoa Jurídica</option>
        </select>
        <select id="filtTipoContato" class="form-control" style="width:auto">
          <option value="">Todas as categorias</option>
          <option value="Cliente">Cliente</option>
          <option value="ParteContraria">Parte Contrária</option>
          <option value="Testemunha">Testemunha</option>
          <option value="Perito">Perito</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div id="alertMsg" class="alert" style="display:none"></div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Tipo</th>
                <th>Categoria</th>
                <th>CPF/CNPJ</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Tags</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--color-text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <!-- Modal Contato -->
  <div class="modal-overlay" id="modalContato">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Contato</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="modalAlert" class="alert alert-error" style="display:none"></div>
        <form id="contatoForm">
          <div class="form-row">
            <div class="form-group">
              <label>Tipo de Pessoa</label>
              <select id="fTipo" class="form-control" required>
                <option value="PF">Pessoa Física</option>
                <option value="PJ">Pessoa Jurídica</option>
              </select>
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <select id="fTipoContato" class="form-control" required>
                <option value="Cliente">Cliente</option>
                <option value="ParteContraria">Parte Contrária</option>
                <option value="Testemunha">Testemunha</option>
                <option value="Perito">Perito</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Nome *</label>
            <input type="text" id="fNome" class="form-control" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>CPF / CNPJ</label>
              <input type="text" id="fCpfCnpj" class="form-control" placeholder="000.000.000-00">
            </div>
            <div class="form-group">
              <label>OAB</label>
              <input type="text" id="fOab" class="form-control" placeholder="SP 123456">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="fEmail" class="form-control">
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="tel" id="fTelefone" class="form-control" placeholder="(11) 99999-9999">
            </div>
          </div>
          <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="fEndereco" class="form-control" placeholder="Rua, número, complemento">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="fCidade" class="form-control">
            </div>
            <div class="form-group">
              <label>Estado</label>
              <input type="text" id="fEstado" class="form-control" maxlength="2" placeholder="SP">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>CEP</label>
              <input type="text" id="fCep" class="form-control" placeholder="00000-000">
            </div>
            <div class="form-group">
              <label>Data de Nascimento</label>
              <input type="date" id="fDataNascimento" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <label>Tags <span style="color:var(--color-text-muted);font-weight:400">(separadas por vírgula)</span></label>
            <input type="text" id="fTags" class="form-control" placeholder="vip, novo, urgente">
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="fObservacoes" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
              <input type="checkbox" id="fNotificacao"> Habilitar notificações para este contato
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
        <button class="btn btn-primary" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal Atendimento -->
  <div class="modal-overlay" id="modalAtendimento">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <span class="modal-title">Registrar Atendimento</span>
        <button class="modal-close" id="atendimentoClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="atendimentoAlert" class="alert alert-error" style="display:none"></div>
        <form id="atendimentoForm">
          <div class="form-group">
            <label>Data *</label>
            <input type="date" id="aData" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Descrição *</label>
            <textarea id="aDescricao" class="form-control" rows="4" required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="atendimentoCancelar">Cancelar</button>
        <button class="btn btn-primary" id="atendimentoSalvar">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initLayout } from '/js/layout.js';
    import { getContatos, createContato, updateContato, deleteContato, addAtendimento } from '/js/contatos.js';

    initLayout();

    let currentPage = 1;
    let currentFilters = {};
    let editingId = null;
    let atendimentoContatoId = null;

    const modal = document.getElementById('modalContato');
    const modalAtend = document.getElementById('modalAtendimento');
    const alertMsg = document.getElementById('alertMsg');

    function showAlert(msg, type = 'error') {
      alertMsg.className = `alert alert-${type}`;
      alertMsg.textContent = msg;
      alertMsg.style.display = 'block';
      setTimeout(() => alertMsg.style.display = 'none', 4000);
    }

    async function loadContatos() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px">Carregando...</td></tr>';

      try {
        const result = await getContatos({ ...currentFilters, page: currentPage });
        renderTable(result.items);
        renderPagination(result.totalPages, result.page);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--color-danger)">${err.message}</td></tr>`;
      }
    }

    function renderTable(items) {
      const tbody = document.getElementById('tableBody');
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="8">
          <div class="empty-state">
            <div class="empty-state-icon">👥</div>
            <div class="empty-state-text">Nenhum contato encontrado</div>
          </div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = items.map(c => `
        <tr>
          <td data-label="Nome"><strong>${c.nome}</strong></td>
          <td data-label="Tipo"><span class="badge badge-${c.tipo === 'PF' ? 'blue' : 'gray'}">${c.tipo}</span></td>
          <td data-label="Categoria">${formatTipoContato(c.tipoContato)}</td>
          <td data-label="CPF/CNPJ">${c.cpfCnpj || '—'}</td>
          <td data-label="E-mail">${c.email ? `<a href="mailto:${c.email}">${c.email}</a>` : '—'}</td>
          <td data-label="Telefone">${c.telefone || '—'}</td>
          <td data-label="Tags">${c.tags.map(t => `<span class="badge badge-blue">${t}</span>`).join(' ') || '—'}</td>
          <td data-label="Ações" style="white-space:nowrap">
            <button class="btn btn-secondary btn-sm" onclick="editContato('${c.id}')">Editar</button>
            <button class="btn btn-secondary btn-sm" onclick="openAtendimento('${c.id}')">Atendimento</button>
            <button class="btn btn-danger btn-sm" onclick="removeContato('${c.id}','${c.nome}')">Excluir</button>
          </td>
        </tr>`).join('');
    }

    function formatTipoContato(t) {
      const map = { Cliente: 'Cliente', ParteContraria: 'Parte Contrária', Testemunha: 'Testemunha', Perito: 'Perito', Outro: 'Outro' };
      return map[t] || t;
    }

    function renderPagination(total, current) {
      const el = document.getElementById('pagination');
      if (total <= 1) { el.innerHTML = ''; return; }
      let html = `<button ${current <= 1 ? 'disabled' : ''} onclick="goPage(${current - 1})">‹</button>`;
      for (let i = 1; i <= total; i++) {
        html += `<button class="${i === current ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button ${current >= total ? 'disabled' : ''} onclick="goPage(${current + 1})">›</button>`;
      el.innerHTML = html;
    }

    window.goPage = (p) => { currentPage = p; loadContatos(); };

    window.editContato = async (id) => {
      try {
        const { getContato } = await import('/js/contatos.js');
        const c = await getContato(id);
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Editar Contato';
        fillForm(c);
        modal.classList.add('open');
      } catch (err) { showAlert(err.message); }
    };

    window.removeContato = async (id, nome) => {
      if (!confirm(`Desativar contato "${nome}"?`)) return;
      try {
        await deleteContato(id);
        showAlert('Contato desativado.', 'success');
        loadContatos();
      } catch (err) { showAlert(err.message); }
    };

    window.openAtendimento = (id) => {
      atendimentoContatoId = id;
      document.getElementById('aData').value = new Date().toISOString().split('T')[0];
      document.getElementById('aDescricao').value = '';
      modalAtend.classList.add('open');
    };

    function fillForm(c) {
      document.getElementById('fTipo').value = c.tipo;
      document.getElementById('fTipoContato').value = c.tipoContato;
      document.getElementById('fNome').value = c.nome;
      document.getElementById('fCpfCnpj').value = c.cpfCnpj || '';
      document.getElementById('fOab').value = c.oab || '';
      document.getElementById('fEmail').value = c.email || '';
      document.getElementById('fTelefone').value = c.telefone || '';
      document.getElementById('fEndereco').value = c.endereco || '';
      document.getElementById('fCidade').value = c.cidade || '';
      document.getElementById('fEstado').value = c.estado || '';
      document.getElementById('fCep').value = c.cep || '';
      document.getElementById('fDataNascimento').value = c.dataNascimento?.split('T')[0] || '';
      document.getElementById('fTags').value = (c.tags || []).join(', ');
      document.getElementById('fObservacoes').value = c.observacoes || '';
      document.getElementById('fNotificacao').checked = c.notificacaoHabilitada;
    }

    function readForm() {
      return {
        tipo: document.getElementById('fTipo').value,
        tipoContato: document.getElementById('fTipoContato').value,
        nome: document.getElementById('fNome').value,
        cpfCnpj: document.getElementById('fCpfCnpj').value || null,
        oab: document.getElementById('fOab').value || null,
        email: document.getElementById('fEmail').value || null,
        telefone: document.getElementById('fTelefone').value || null,
        endereco: document.getElementById('fEndereco').value || null,
        cidade: document.getElementById('fCidade').value || null,
        estado: document.getElementById('fEstado').value || null,
        cep: document.getElementById('fCep').value || null,
        dataNascimento: document.getElementById('fDataNascimento').value || null,
        tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
        observacoes: document.getElementById('fObservacoes').value || null,
        notificacaoHabilitada: document.getElementById('fNotificacao').checked
      };
    }

    function resetModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Novo Contato';
      document.getElementById('contatoForm').reset();
      document.getElementById('modalAlert').style.display = 'none';
    }

    document.getElementById('btnNovo').addEventListener('click', () => {
      resetModal();
      modal.classList.add('open');
    });

    [document.getElementById('modalClose'), document.getElementById('btnCancelar')].forEach(el =>
      el.addEventListener('click', () => { modal.classList.remove('open'); resetModal(); }));

    [document.getElementById('atendimentoClose'), document.getElementById('atendimentoCancelar')].forEach(el =>
      el.addEventListener('click', () => modalAtend.classList.remove('open')));

    document.getElementById('btnSalvar').addEventListener('click', async () => {
      const data = readForm();
      const btn = document.getElementById('btnSalvar');
      const modalAlert = document.getElementById('modalAlert');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      modalAlert.style.display = 'none';
      try {
        if (editingId) await updateContato(editingId, data);
        else await createContato(data);
        modal.classList.remove('open');
        showAlert(editingId ? 'Contato atualizado.' : 'Contato criado.', 'success');
        loadContatos();
      } catch (err) {
        modalAlert.textContent = err.message;
        modalAlert.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    });

    document.getElementById('atendimentoSalvar').addEventListener('click', async () => {
      const btn = document.getElementById('atendimentoSalvar');
      const alertEl = document.getElementById('atendimentoAlert');
      btn.disabled = true;
      alertEl.style.display = 'none';
      try {
        await addAtendimento(atendimentoContatoId, {
          data: document.getElementById('aData').value,
          descricao: document.getElementById('aDescricao').value
        });
        modalAtend.classList.remove('open');
        showAlert('Atendimento registrado.', 'success');
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    });

    // Filters with debounce
    let debounceTimer;
    ['filtBusca', 'filtTipo', 'filtTipoContato'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          currentFilters = {
            busca: document.getElementById('filtBusca').value || undefined,
            tipo: document.getElementById('filtTipo').value || undefined,
            tipoContato: document.getElementById('filtTipoContato').value || undefined
          };
          currentPage = 1;
          loadContatos();
        }, 300);
      });
    });

    loadContatos();
  </script>
</body>
</html>
