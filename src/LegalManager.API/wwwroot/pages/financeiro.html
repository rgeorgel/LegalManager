<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Financeiro</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .resumo-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
    .resumo-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
    .resumo-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--color-text-muted); }
    .resumo-value { font-size:22px; font-weight:700; margin-top:6px; }
    .tipo-receita { background:#e5f7ee; color:#15803d; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; }
    .tipo-despesa { background:#fee2e2; color:#dc2626; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; }
    .status-pago    { background:#d1fae5; color:#057a55; font-size:11px; padding:2px 8px; border-radius:4px; }
    .status-pendente{ background:#fef3c7; color:#92400e; font-size:11px; padding:2px 8px; border-radius:4px; }
    .status-vencido { background:#fee2e2; color:#b91c1c; font-size:11px; padding:2px 8px; border-radius:4px; }
    .status-cancelado{ background:#f3f4f6; color:#6b7280; font-size:11px; padding:2px 8px; border-radius:4px; }
    .lancamento-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--color-border); flex-wrap:wrap; gap:8px; }
    .lancamento-info { display:flex; flex-direction:column; gap:4px; }
    .lancamento-valor { font-size:16px; font-weight:700; }
    .lancamento-actions { display:flex; gap:8px; }
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
    .filter-bar select, .filter-bar input { padding:7px 10px; border:1px solid var(--color-border); border-radius:var(--radius); font-size:13px; background:var(--color-surface); }
  </style>
</head>
<body>
  <div class="app-layout">
    <header class="header">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="header-logo">⚖️ LegalManager</div>
      <div class="header-spacer"></div>
      <div class="header-user">
        <span class="header-user-name"></span>
        <span style="color:var(--color-border)">|</span>
        <span class="header-tenant"></span>
        <button class="btn btn-secondary btn-sm" id="logoutBtn">Sair</button>
      </div>
    </header>
    <nav class="sidebar"><ul class="sidebar-nav"></ul></nav>
    <main class="main-content">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <h1 class="page-title">💰 Financeiro</h1>
        <button class="btn btn-primary" id="btnNovo">+ Novo Lançamento</button>
      </div>

      <div class="resumo-grid" id="resumoGrid">
        <div class="resumo-card"><div class="resumo-label">Receitas (Pagas)</div><div class="resumo-value" style="color:#15803d" id="rReceitas">—</div></div>
        <div class="resumo-card"><div class="resumo-label">Despesas (Pagas)</div><div class="resumo-value" style="color:#dc2626" id="rDespesas">—</div></div>
        <div class="resumo-card"><div class="resumo-label">Saldo</div><div class="resumo-value" id="rSaldo">—</div></div>
        <div class="resumo-card"><div class="resumo-label">A Receber</div><div class="resumo-value" style="color:#ca8a04" id="rAReceber">—</div></div>
        <div class="resumo-card"><div class="resumo-label">A Pagar</div><div class="resumo-value" style="color:#ea580c" id="rAPagar">—</div></div>
        <div class="resumo-card" style="border-color:#fca5a5"><div class="resumo-label" style="color:#dc2626">Receitas Vencidas</div><div class="resumo-value" style="color:#dc2626;font-size:16px" id="rRecVenc">—</div></div>
      </div>

      <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);padding:20px">
        <div class="filter-bar">
          <select id="filtroTipo"><option value="">Todos</option><option value="Receita">Receitas</option><option value="Despesa">Despesas</option></select>
          <select id="filtroStatus"><option value="">Todos os status</option><option value="Pendente">Pendente</option><option value="Pago">Pago</option><option value="Vencido">Vencido</option><option value="Cancelado">Cancelado</option></select>
          <button class="btn btn-secondary btn-sm" onclick="loadLancamentos()">Filtrar</button>
        </div>
        <div id="lista"><span style="color:var(--color-text-muted);font-size:14px">Carregando...</span></div>
        <div id="paginacao" style="display:flex;justify-content:center;gap:8px;margin-top:16px"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:var(--radius);padding:28px;width:min(520px,95vw);max-height:90vh;overflow-y:auto">
      <h2 id="modalTitle" style="margin:0 0 20px">Novo Lançamento</h2>
      <form id="form">
        <input type="hidden" id="editId">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Tipo *</label>
            <select id="fTipo" class="form-control" required>
              <option value="Receita">Receita</option>
              <option value="Despesa">Despesa</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Categoria *</label>
            <select id="fCategoria" class="form-control" required></select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Valor (R$) *</label>
            <input id="fValor" type="number" step="0.01" min="0.01" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Vencimento *</label>
            <input id="fVencimento" type="date" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <input id="fDescricao" type="text" maxlength="500" class="form-control">
        </div>
        <div style="display:flex;gap:12px;margin-top:20px;justify-content:flex-end">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLayout } from '/js/layout.js';
    import { apiFetch } from '/js/api.js';

    initLayout();

    const CATEGORIAS = {
      Receita: ['Honorario','Custas','Pericia','Deposito','Reembolso','Outro'],
      Despesa: ['Salario','AluguelEscritorio','Software','Marketing','Custas','Multa','Outro']
    };
    const CAT_LABELS = {
      Honorario:'Honorário', Custas:'Custas', Pericia:'Perícia', Deposito:'Depósito',
      Reembolso:'Reembolso', Salario:'Salário', AluguelEscritorio:'Aluguel Escritório',
      Software:'Software', Marketing:'Marketing', Multa:'Multa', Outro:'Outro'
    };

    let currentPage = 1;
    const pageSize = 20;

    window.loadLancamentos = loadLancamentos;
    window.closeModal = closeModal;

    loadResumo();
    loadLancamentos();

    document.getElementById('btnNovo').onclick = () => openModal(null);
    document.getElementById('fTipo').onchange = updateCategorias;
    document.getElementById('form').onsubmit = salvar;

    async function loadResumo() {
      try {
        const r = await apiFetch('/financeiro/resumo');
        const fmt = v => 'R$ ' + (v || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('rReceitas').textContent = fmt(r.totalReceitas);
        document.getElementById('rDespesas').textContent = fmt(r.totalDespesas);
        const saldoEl = document.getElementById('rSaldo');
        saldoEl.textContent = fmt(r.saldo);
        saldoEl.style.color = r.saldo >= 0 ? '#15803d' : '#dc2626';
        document.getElementById('rAReceber').textContent = fmt(r.receitasPendentes);
        document.getElementById('rAPagar').textContent = fmt(r.despesasPendentes);
        document.getElementById('rRecVenc').textContent = fmt(r.receitasVencidas);
      } catch (e) { console.error(e); }
    }

    async function loadLancamentos(page = 1) {
      currentPage = page;
      const tipo = document.getElementById('filtroTipo').value;
      const status = document.getElementById('filtroStatus').value;
      const qs = new URLSearchParams({ page, pageSize });
      if (tipo) qs.append('tipo', tipo);
      if (status) qs.append('status', status);

      const lista = document.getElementById('lista');
      lista.innerHTML = '<span style="color:var(--color-text-muted);font-size:14px">Carregando...</span>';
      try {
        const data = await apiFetch(`/financeiro?${qs}`);
        if (!data.items?.length) {
          lista.innerHTML = '<span style="color:var(--color-text-muted);font-size:14px">Nenhum lançamento encontrado.</span>';
          document.getElementById('paginacao').innerHTML = '';
          return;
        }
        lista.innerHTML = data.items.map(l => renderRow(l)).join('');
        renderPaginacao(data.total, page);
      } catch (e) { lista.innerHTML = `<span style="color:red">${esc(e.message)}</span>`; }
    }

    function renderRow(l) {
      const fmt = v => 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2});
      const dt = new Date(l.dataVencimento).toLocaleDateString('pt-BR');
      const dtPago = l.dataPagamento ? new Date(l.dataPagamento).toLocaleDateString('pt-BR') : null;
      return `<div class="lancamento-row">
        <div class="lancamento-info">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="lancamento-valor ${l.tipo === 'Receita' ? 'color:#15803d' : 'color:#dc2626'}" style="color:${l.tipo === 'Receita' ? '#15803d' : '#dc2626'}">${fmt(l.valor)}</span>
            <span class="tipo-${l.tipo.toLowerCase()}">${l.tipo}</span>
            <span class="status-${l.status.toLowerCase()}">${l.status}</span>
          </div>
          <div style="font-size:13px;color:var(--color-text-muted)">${esc(CAT_LABELS[l.categoria] ?? l.categoria)} · Venc: ${dt}${dtPago ? ` · Pago: ${dtPago}` : ''}${l.numeroProcesso ? ` · ${esc(l.numeroProcesso)}` : ''}${l.nomeContato ? ` · ${esc(l.nomeContato)}` : ''}</div>
          ${l.descricao ? `<div style="font-size:12px;color:#6b7280">${esc(l.descricao)}</div>` : ''}
        </div>
        <div class="lancamento-actions">
          ${l.status === 'Pendente' ? `<button class="btn btn-secondary btn-sm" onclick="pagar('${l.id}')">✓ Pagar</button>` : ''}
          ${l.status !== 'Cancelado' && l.status !== 'Pago' ? `<button class="btn btn-secondary btn-sm" onclick="editarLancamento('${l.id}','${l.tipo}','${l.categoria}',${l.valor},'${l.dataVencimento.substring(0,10)}','${esc(l.descricao ?? '')}')">Editar</button>` : ''}
          ${l.status !== 'Cancelado' ? `<button class="btn btn-secondary btn-sm" style="color:#dc2626" onclick="cancelar('${l.id}')">Cancelar</button>` : ''}
        </div>
      </div>`;
    }

    function renderPaginacao(total, page) {
      const pages = Math.ceil(total / pageSize);
      const el = document.getElementById('paginacao');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = Array.from({length: pages}, (_, i) => i + 1).map(p =>
        `<button class="btn btn-sm ${p === page ? 'btn-primary' : 'btn-secondary'}" onclick="loadLancamentos(${p})">${p}</button>`
      ).join('');
    }

    window.pagar = async function(id) {
      if (!confirm('Confirmar pagamento?')) return;
      await apiFetch(`/financeiro/${id}/pagar`, { method: 'POST', body: JSON.stringify({}) });
      loadResumo(); loadLancamentos(currentPage);
    };

    window.cancelar = async function(id) {
      if (!confirm('Cancelar este lançamento?')) return;
      await apiFetch(`/financeiro/${id}/cancelar`, { method: 'POST' });
      loadResumo(); loadLancamentos(currentPage);
    };

    window.editarLancamento = function(id, tipo, cat, valor, venc, desc) {
      openModal({ id, tipo, categoria: cat, valor, dataVencimento: venc, descricao: desc });
    };

    function openModal(item) {
      document.getElementById('editId').value = item?.id ?? '';
      document.getElementById('modalTitle').textContent = item ? 'Editar Lançamento' : 'Novo Lançamento';
      document.getElementById('fTipo').value = item?.tipo ?? 'Receita';
      document.getElementById('fTipo').disabled = !!item;
      updateCategorias();
      document.getElementById('fCategoria').value = item?.categoria ?? '';
      document.getElementById('fValor').value = item?.valor ?? '';
      document.getElementById('fVencimento').value = item?.dataVencimento ?? '';
      document.getElementById('fDescricao').value = item?.descricao ?? '';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.getElementById('fTipo').disabled = false;
    }

    function updateCategorias() {
      const tipo = document.getElementById('fTipo').value;
      const sel = document.getElementById('fCategoria');
      sel.innerHTML = (CATEGORIAS[tipo] ?? []).map(c => `<option value="${c}">${CAT_LABELS[c] ?? c}</option>`).join('');
    }

    async function salvar(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const body = {
        tipo: document.getElementById('fTipo').value,
        categoria: document.getElementById('fCategoria').value,
        valor: parseFloat(document.getElementById('fValor').value),
        dataVencimento: document.getElementById('fVencimento').value,
        descricao: document.getElementById('fDescricao').value || null
      };
      const btn = document.getElementById('btnSalvar');
      btn.disabled = true;
      try {
        if (id) {
          await apiFetch(`/financeiro/${id}`, { method: 'PUT', body: JSON.stringify({ categoria: body.categoria, valor: body.valor, dataVencimento: body.dataVencimento, descricao: body.descricao }) });
        } else {
          await apiFetch('/financeiro', { method: 'POST', body: JSON.stringify(body) });
        }
        closeModal();
        loadResumo();
        loadLancamentos(currentPage);
      } catch (ex) { alert('Erro: ' + ex.message); }
      finally { btn.disabled = false; }
    }

    function esc(s) { return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
