<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z40PJ2FYE2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Z40PJ2FYE2');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Nova Senha</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">⚖️ LegalManager</div>
      <div class="auth-subtitle">Crie sua nova senha</div>
      <div id="alert" class="alert" style="display:none"></div>
      <form id="resetForm">
        <div class="form-group">
          <label>Nova Senha</label>
          <input type="password" id="novaSenha" class="form-control" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Salvar nova senha</button>
      </form>
      <div class="auth-footer"><a href="/login.html">← Voltar ao login</a></div>
    </div>
  </div>
  <script type="module">
    import { resetPassword } from '/js/auth.js';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    if (!token || !email) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Link inválido.';
      alertEl.style.display = 'block';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      alertEl.style.display = 'none';
      try {
        await resetPassword({ token, email, novaSenha: document.getElementById('novaSenha').value });
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Senha alterada! Redirecionando...';
        alertEl.style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 2000);
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
      }
    });
  </script>
</body>
</html>
