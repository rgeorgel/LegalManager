<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Processos — Portal do Cliente</title>
  <link rel="stylesheet" href="/cliente/css/portal.css">
</head>
<body>
  <header class="portal-nav" id="portalNav"></header>

  <main class="portal-page">
    <div class="page-header">
      <h1 class="page-title">Meus Processos</h1>
      <p class="page-subtitle">Todos os processos em que você é parte</p>
    </div>

    <div id="content">
      <div class="loading"><span class="spinner spinner-dark"></span></div>
    </div>
  </main>

  <script type="module">
    import { initLayout, statusBadge, faseBadge, tipoParteLabel } from '/cliente/js/clienteLayout.js';
    import { portalApi } from '/cliente/js/clienteApi.js';

    initLayout('processos');

    const content = document.getElementById('content');

    try {
      const processos = await portalApi.getMeusProcessos();
      const arr = [...processos];

      if (arr.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📂</div>
            <div class="empty-state-title">Nenhum processo encontrado</div>
            <div class="empty-state-desc">Seus processos aparecerão aqui quando forem cadastrados pelo escritório.</div>
          </div>`;
        return;
      }

      content.innerHTML = `<div class="processo-list">${arr.map(p => `
        <a class="processo-card" href="/cliente/processo-detalhe.html?id=${p.id}">
          <div class="processo-cnj">${p.numeroCNJ}</div>
          <div class="processo-meta">
            ${p.tribunal ? `<span>${p.tribunal}</span>` : ''}
            ${p.comarca ? `<span>${p.comarca}</span>` : ''}
            <span>${p.areaDireito}</span>
            <span>${tipoParteLabel(p.tipoParte)}</span>
          </div>
          <div class="processo-tags">
            ${statusBadge(p.status)}
            ${faseBadge(p.fase)}
            ${p.totalAndamentos > 0 ? `<span class="badge badge-gray">${p.totalAndamentos} andamento${p.totalAndamentos !== 1 ? 's' : ''}</span>` : ''}
          </div>
        </a>`).join('')}</div>`;
    } catch (err) {
      content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  </script>
</body>
</html>
