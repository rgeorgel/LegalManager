<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Cliente — LegalManager</title>
  <link rel="stylesheet" href="/cliente/css/portal.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">⚖️ LegalManager</div>
      <div class="auth-subtitle">Portal do Cliente — Acompanhe seus processos</div>

      <div id="alert" class="alert alert-error" style="display:none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          Entrar
        </button>
      </form>

      <div class="auth-footer">
        Área exclusiva para clientes do escritório.<br>
        Problemas? Entre em contato com seu advogado.
      </div>
    </div>
  </div>

  <script type="module">
    import { login, isLoggedIn } from '/cliente/js/clienteApi.js';

    if (isLoggedIn()) window.location.href = '/cliente/dashboard.html';

    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';

      try {
        await login(
          document.getElementById('email').value,
          document.getElementById('senha').value
        );
        window.location.href = '/cliente/dashboard.html';
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
