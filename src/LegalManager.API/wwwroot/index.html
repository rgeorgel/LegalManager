<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">⚖️ LegalManager</div>
      <div class="auth-subtitle">Gestão jurídica para escritórios modernos</div>

      <div id="alert" class="alert alert-error" style="display:none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">
          Entrar
        </button>
      </form>

      <div class="auth-footer">
        <a href="/forgot-password.html">Esqueceu a senha?</a>
        &nbsp;·&nbsp;
        <a href="/register.html">Criar escritório</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, isLoggedIn } from '/js/auth.js';

    if (isLoggedIn()) window.location.href = '/pages/dashboard.html';

    const form = document.getElementById('loginForm');
    const alert = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Entrando...';

      try {
        await login(
          document.getElementById('email').value,
          document.getElementById('senha').value
        );
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        alert.textContent = err.message;
        alert.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
