<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalManager — Recuperar Senha</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">⚖️ LegalManager</div>
      <div class="auth-subtitle">Informe seu e-mail para receber o link de recuperação</div>

      <div id="alert" class="alert" style="display:none"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Enviar link</button>
      </form>

      <div class="auth-footer"><a href="/login.html">← Voltar ao login</a></div>
    </div>
  </div>

  <script type="module">
    import { forgotPassword } from '/js/auth.js';

    const form = document.getElementById('forgotForm');
    const alertEl = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        await forgotPassword(document.getElementById('email').value);
        alertEl.className = 'alert alert-success';
        alertEl.textContent = 'Se o e-mail estiver cadastrado, você receberá as instruções em breve.';
        alertEl.style.display = 'block';
        form.reset();
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = err.message;
        alertEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar link';
      }
    });
  </script>
</body>
</html>
