services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legalmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

  api:
    build:
      context: .
      dockerfile: src/LegalManager.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=legalmanager;Username=postgres;Password=postgres"
      Jwt__Key: "CHANGE_THIS_SECRET_KEY_IN_PRODUCTION_MIN_32_CHARS"
      Jwt__Issuer: LegalManager
      Jwt__Audience: LegalManagerUsers
      App__FrontendUrl: "http://localhost:5000"
      Serilog__WriteTo__0__Name: Seq
      Serilog__WriteTo__0__Args__serverUrl: "http://seq:5341"
    depends_on:
      - postgres
      - seq

volumes:
  postgres_data:
  seq_data:
